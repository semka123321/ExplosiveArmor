name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: gradle build
        working-directory: ExplosiveArmor

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ExplosiveArmor
          path: ExplosiveArmor/build/libs/*.jar
